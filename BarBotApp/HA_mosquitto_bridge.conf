# =============================================================================
# Mosquitto Bridge:  Lokaler HA-Broker  →  HiveMQ Cloud
# =============================================================================
#
# Setup-Architektur:
#
#   ESP32 Bollerwagen ──► Mosquitto (HA Add-on, lokal)  ──Bridge──►  HiveMQ Cloud
#                                                                      ▲
#                              BarBot ─────────────MQTT────────────────┘
#                              WebApp ─────────────WSS─────────────────┘
#
# Der Bollerwagen-ESP32 spricht NUR mit dem lokalen Broker (kein Internet
# nötig). Diese Bridge spiegelt die Telemetrie- und Status-Topics in die
# HiveMQ Cloud, damit die WebApp sie sehen kann.
#
# =============================================================================
# Installation im Home Assistant Mosquitto-Add-on
# =============================================================================
#
# 1. Datei nach `/share/mosquitto/bollerwagen_bridge.conf` kopieren
#    (z.B. via Samba-Share oder File-Editor-Add-on).
#
# 2. Im Mosquitto-Add-on (Settings → Add-ons → Mosquitto broker → Configuration)
#    diesen Block sicherstellen:
#
#       customize:
#         active: true
#         folder: mosquitto
#
# 3. Add-on neu starten. Im Log sollte stehen:
#       Connecting bridge hivemq-cloud (3eb07fcfa5af4fc6b090299bd78da073...)
#       ... bridge hivemq-cloud connected
#
# =============================================================================
# Hinweise
# =============================================================================
#
# - Die Topics werden 1:1 gespiegelt — kein Prefix-Remap. Damit kann die
#   WebApp dieselben Topic-Namen nutzen wie HA-MQTT-Sensoren.
# - Nur `out` definiert: ESP32-Telemetrie wandert NACH HiveMQ. Befehle
#   werden NICHT zurück gespiegelt — die WebApp ist read-only (siehe
#   bollerwagen.html). Falls später doch Steuerung gewünscht ist, einfach
#   die `cmd/+`-Zeile am Ende einkommentieren.
# - Passwort steht im Klartext (analog zur WebApp). Für Produktion: einen
#   eigenen HiveMQ-User `bollerwagen_bridge` mit minimalen ACLs anlegen.
# =============================================================================

connection                  hivemq-cloud
address                     3eb07fcfa5af4fc6b090299bd78da073.s1.eu.hivemq.cloud:8883

# Auth (HiveMQ Cloud Credentials, identisch zu WebApp)
remote_username             Barbot
remote_password             MQTTBarbot123

# TLS – HiveMQ verlangt TLS auf 8883.
# Im HA-Mosquitto-Container liegt der CA-Bundle hier:
bridge_cafile               /etc/ssl/certs/ca-certificates.crt
bridge_insecure             false
bridge_protocol_version     mqttv311

# Eindeutige Client-ID, sonst kickt sich die Bridge bei Reconnect selbst raus
remote_clientid             ha-bollerwagen-bridge

# Persistente Session, damit retained Messages nach Bridge-Reconnect
# nicht doppelt durch den lokalen Broker laufen
cleansession                false
notifications               false
try_private                 false
start_type                  automatic
restart_timeout             10

# -----------------------------------------------------------------------------
# Topics:  out = lokal → Cloud,  in = Cloud → lokal,  both = bidirektional
# Format:  topic <pattern> <direction> <qos> <local-prefix> <remote-prefix>
# -----------------------------------------------------------------------------

# Telemetrie (alle 3s vom ESP32, JSON)
topic bollerwagen/state    out 1 "" ""

# Online-Status (retained "online", LWT "offline")
topic bollerwagen/status   out 1 "" ""

# OPTIONAL: Befehle aus Cloud zurück an ESP32 spiegeln (für spätere Steuerung)
# topic bollerwagen/cmd/+  in  1 "" ""
