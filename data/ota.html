<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTA Update – Bollerwagen</title>
    <style>
        :root {
            --primary-color: #007bff; --background-color: #f8f9fa;
            --card-background: #ffffff; --text-color: #343a40;
            --text-muted: #6c757d; --success-color: #28a745;
            --danger-color: #dc3545; --warning-color: #ffc107;
            --border-radius: 8px; --box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
               background-color: var(--background-color); margin: 0; padding: 15px;
               color: var(--text-color); line-height: 1.6; }
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        h1 { color: var(--primary-color); text-align: center; margin-bottom: 25px; }
        .card { background-color: var(--card-background); padding: 25px;
                border-radius: var(--border-radius); box-shadow: var(--box-shadow); margin-bottom: 20px; }
        .card h2 { color: var(--primary-color); margin-top: 0; font-size: 1.1em; }
        .warning-box { background-color: #fff3cd; border-left: 4px solid var(--warning-color);
                       padding: 12px 16px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9em; }
        .drop-zone { border: 2px dashed #ced4da; border-radius: var(--border-radius);
                     padding: 40px 20px; text-align: center; cursor: pointer;
                     transition: border-color 0.2s, background-color 0.2s; margin-bottom: 16px; }
        .drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary-color);
                                                  background-color: #e8f0fe; }
        .drop-zone .icon { font-size: 2.5em; margin-bottom: 10px; }
        .drop-zone .hint { color: var(--text-muted); font-size: 0.9em; margin-top: 6px; }
        #file-name { font-weight: bold; color: var(--primary-color); margin-top: 8px;
                     min-height: 1.4em; text-align: center; }
        input[type="file"] { display: none; }
        .btn { display: inline-block; padding: 10px 24px; border: none;
               border-radius: var(--border-radius); cursor: pointer; font-size: 0.95em;
               text-decoration: none; margin: 4px; transition: background-color 0.2s; }
        .btn-primary { background-color: var(--primary-color); color: white; width: 100%;
                       box-sizing: border-box; font-size: 1em; padding: 12px; }
        .btn-primary:hover { background-color: #0056b3; }
        .btn-primary:disabled { background-color: #6c757d; cursor: not-allowed; }
        .btn-secondary { background-color: #6c757d; color: white; }
        .btn-secondary:hover { background-color: #5a6268; }
        .progress-wrap { display: none; margin-top: 16px; }
        .progress-bar-bg { background-color: #e9ecef; border-radius: 4px; height: 22px; overflow: hidden; }
        .progress-bar { background-color: var(--primary-color); height: 100%; width: 0%;
                        transition: width 0.3s ease; border-radius: 4px; }
        .progress-label { text-align: center; font-size: 0.85em; color: var(--text-muted); margin-top: 4px; }
        #status { margin-top: 16px; font-weight: bold; min-height: 1.4em; text-align: center; }
        .status-ok  { color: var(--success-color); }
        .status-err { color: var(--danger-color); }
        a { color: var(--primary-color); }
    </style>
</head>
<body>
<div class="container">
    <h1>OTA Firmware Update</h1>

    <div class="warning-box">
        &#9888; Falsche Firmware kann den Bollerwagen unbrauchbar machen.
        Nur <strong>.bin</strong>-Dateien aus dem Arduino-Build hochladen.
        Motor wird vor dem Neustart automatisch gestoppt.
    </div>

    <div class="card">
        <h2>Firmware-Datei</h2>

        <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <div class="icon">&#128190;</div>
            <div>Datei hier ablegen oder klicken</div>
            <div class="hint">.bin – Arduino ESP32 Sketch</div>
        </div>
        <input type="file" id="file-input" accept=".bin">
        <div id="file-name">Keine Datei ausgewählt</div>

        <div class="progress-wrap" id="progress-wrap">
            <div class="progress-bar-bg">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="progress-label" id="progress-label">0%</div>
        </div>

        <div id="status"></div>

        <br>
        <button class="btn btn-primary" id="upload-btn" onclick="startUpload()" disabled>
            &#8593; Firmware hochladen &amp; flashen
        </button>
    </div>

    <a href="/" class="btn btn-secondary">&#8592; Zurück</a>
</div>

<script>
    const dropZone   = document.getElementById('drop-zone');
    const fileInput  = document.getElementById('file-input');
    const fileNameEl = document.getElementById('file-name');
    const uploadBtn  = document.getElementById('upload-btn');
    const statusEl   = document.getElementById('status');
    let selectedFile = null;

    fileInput.addEventListener('change', () => setFile(fileInput.files[0]));

    dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        setFile(e.dataTransfer.files[0]);
    });

    function setFile(f) {
        if (!f) return;
        if (!f.name.endsWith('.bin')) {
            statusEl.className = 'status-err';
            statusEl.textContent = 'Fehler: Nur .bin-Dateien erlaubt.';
            return;
        }
        selectedFile = f;
        fileNameEl.textContent = f.name + '  (' + (f.size / 1024).toFixed(1) + ' kB)';
        uploadBtn.disabled = false;
        statusEl.textContent = '';
    }

    function startUpload() {
        if (!selectedFile) return;
        uploadBtn.disabled = true;
        statusEl.textContent = '';

        const wrap  = document.getElementById('progress-wrap');
        const bar   = document.getElementById('progress-bar');
        const label = document.getElementById('progress-label');
        wrap.style.display = 'block';

        const formData = new FormData();
        formData.append('firmware', selectedFile, selectedFile.name);

        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/update', true);

        xhr.upload.addEventListener('progress', e => {
            if (e.lengthComputable) {
                const pct = Math.round(e.loaded / e.total * 100);
                bar.style.width  = pct + '%';
                label.textContent = pct + '%  (' + (e.loaded/1024).toFixed(0) + ' / ' + (e.total/1024).toFixed(0) + ' kB)';
            }
        });

        xhr.addEventListener('load', () => {
            if (xhr.status === 200) {
                statusEl.className   = 'status-ok';
                statusEl.textContent = '&#10003; Flash erfolgreich! ESP32 startet neu – Seite lädt in 8s...';
                setTimeout(() => location.href = '/', 8000);
            } else {
                statusEl.className   = 'status-err';
                statusEl.textContent = 'Fehler: ' + xhr.responseText;
                uploadBtn.disabled   = false;
            }
        });

        xhr.addEventListener('error', () => {
            statusEl.className   = 'status-err';
            statusEl.textContent = 'Netzwerkfehler beim Upload.';
            uploadBtn.disabled   = false;
        });

        xhr.send(formData);
    }
</script>
</body>
</html>
