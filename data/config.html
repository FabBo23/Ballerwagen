<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfiguration – Bollerwagen</title>
    <style>
        :root {
            --primary-color: #007bff; --secondary-color: #6c757d;
            --background-color: #f8f9fa; --card-background: #ffffff;
            --text-color: #343a40; --text-muted: #6c757d;
            --success-color: #28a745; --danger-color: #dc3545;
            --border-radius: 8px; --box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--background-color); margin:0; padding:15px; color:var(--text-color); line-height:1.6; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        h1 { color: var(--primary-color); text-align: center; margin-bottom: 25px; }
        .card { background-color: var(--card-background); padding: 25px; border-radius: var(--border-radius); box-shadow: var(--box-shadow); margin-bottom: 25px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; }
        input[type='number'] {
            width: 100%; padding: 10px; margin-bottom: 18px;
            border: 1px solid #ced4da; border-radius: 6px;
            box-sizing: border-box; font-size: 1em;
        }
        .btn { display: inline-block; padding: 10px 20px; border: none; border-radius: var(--border-radius); cursor: pointer; font-size: 0.9em; text-decoration: none; margin: 4px; }
        .btn-success  { background-color: var(--success-color);   color: white; }
        .btn-success:hover { background-color: #1e7e34; }
        .btn-secondary { background-color: var(--secondary-color); color: white; }
        .btn-secondary:hover { background-color: #5a6268; }
        .btn-wifi { background-color: #6f42c1; color: white; }
        .btn-wifi:hover { background-color: #5a32a3; }
        #status-msg { margin-top: 10px; font-weight: bold; min-height: 1.4em; }
        .loading { color: var(--text-muted); font-style: italic; }
        a { color: var(--primary-color); }
    </style>
</head>
<body>
<div class="container">
    <h1>Konfiguration</h1>
    <div class="card">
        <p id="status-msg" class="loading">Lade aktuelle Werte…</p>

        <label for="schrittweite">Drehzahl Schrittweite (%):</label>
        <input type="number" id="schrittweite" name="schrittweite" min="1" max="20">

        <label for="rampdelay">Sanftanlauf Verzögerung (ms):</label>
        <input type="number" id="rampdelay" name="rampdelay" min="10" max="1000">

        <label for="wheelcircumference">Radumfang (m):</label>
        <input type="number" step="0.001" id="wheelcircumference" name="wheelcircumference" min="0.1" max="5.0">

        <label for="pulsesperrevolution">Impulse pro Umdrehung:</label>
        <input type="number" id="pulsesperrevolution" name="pulsesperrevolution" min="1" max="100">

        <label for="hornshort">Hupe kurze Dauer (ms):</label>
        <input type="number" id="hornshort" name="hornshort" min="100" max="5000" step="100">

        <label for="hornmax">Hupe max. Dauer (ms):</label>
        <input type="number" id="hornmax" name="hornmax" min="500" max="10000" step="100">

        <label for="mbuttonlongpress">M-Taste langer Druck (ms):</label>
        <input type="number" id="mbuttonlongpress" name="mbuttonlongpress" min="500" max="5000" step="100">

        <button class="btn btn-success" onclick="saveConfig()">💾 Speichern</button>
        <a href="/"     class="btn btn-secondary">← Zurück</a>
        <a href="/wifi" class="btn btn-wifi">📶 WLAN-Einstellungen</a>
    </div>
</div>

<script>
    // Aktuelle Konfiguration vom ESP32 laden
    fetch('/get_config')
        .then(r => r.json())
        .then(d => {
            document.getElementById('schrittweite').value       = d.schrittweite;
            document.getElementById('rampdelay').value          = d.rampdelay;
            document.getElementById('wheelcircumference').value = d.wheelcirc;
            document.getElementById('pulsesperrevolution').value= d.pulsesperrev;
            document.getElementById('hornshort').value          = d.hornshort;
            document.getElementById('hornmax').value            = d.hornmax;
            document.getElementById('mbuttonlongpress').value   = d.mbuttonlong;
            document.getElementById('status-msg').textContent   = '';
        })
        .catch(e => {
            document.getElementById('status-msg').textContent = 'Fehler beim Laden der Konfiguration: ' + e;
        });

    function saveConfig() {
        const body = new URLSearchParams({
            schrittweite:       document.getElementById('schrittweite').value,
            rampdelay:          document.getElementById('rampdelay').value,
            wheelcircumference: document.getElementById('wheelcircumference').value,
            pulsesperrevolution:document.getElementById('pulsesperrevolution').value,
            hornshort:          document.getElementById('hornshort').value,
            hornmax:            document.getElementById('hornmax').value,
            mbuttonlongpress:   document.getElementById('mbuttonlongpress').value
        });

        fetch('/save_config', { method: 'POST', body })
            .then(r => {
                const msg = document.getElementById('status-msg');
                if (r.ok || r.status === 303) {
                    msg.style.color = '#28a745';
                    msg.textContent = '✓ Konfiguration gespeichert!';
                } else {
                    msg.style.color = '#dc3545';
                    msg.textContent = 'Fehler beim Speichern (HTTP ' + r.status + ')';
                }
            })
            .catch(e => {
                document.getElementById('status-msg').style.color = '#dc3545';
                document.getElementById('status-msg').textContent = 'Netzwerkfehler: ' + e;
            });
    }
</script>
</body>
</html>
